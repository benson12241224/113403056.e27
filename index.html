<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Assignment</title>
    <style>
        /* 基礎背景與容器設定 */
        body {
            background-color: #6da9f2;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .container {
            background-color: white;
            width: 90%;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 頂部綠色區塊 */
        .header {
            background-color: #b1d36a;
            height: 150px;
            width: 100%;
        }

        /* 中間藍色區塊容器 */
        .middle-section {
            display: flex;
            gap: 15px;
            flex-direction: column; /* 預設手機版：垂直排列 (a) */
        }

        .blue-box {
            background-color: #5abcc7;
            height: 80px;
            flex: 1;
        }

        /* 底部灰色區塊容器 */
        .footer-section {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(2, 1fr); /* 預設手機版：2欄 (a) */
        }

        .gray-box {
            background-color: #f0f0f0;
            height: 50px;
        }

        /* --- 響應式關鍵：當寬度大於 480px 時 (b) --- */
        @media (min-width: 481px) {
            .middle-section {
                flex-direction: row; /* 切換為水平排列 */
                height: 200px;
            }
            
            .blue-box {
                height: auto; /* 填滿容器高度 */
            }

            .footer-section {
                grid-template-columns: repeat(4, 1fr); /* 切換為 4 欄排列 */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header"></div>

        <div class="middle-section">
            <div class="blue-box"></div>
            <div class="blue-box"></div>
            <div class="blue-box"></div>
        </div>

        <div class="footer-section">
            <div class="gray-box"></div>
            <div class="gray-box"></div>
            <div class="gray-box"></div>
            <div class="gray-box"></div>
        </div>
    </div>

</body>
</html>
